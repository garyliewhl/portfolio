<section id="contact" class="contact">
    <div class="container">
        <div class="contact-content">
            <div class="contact-info">
                <h3>Contact Information</h3>
                <p>Feel free to reach out through any of the following channels:</p>
                <ul class="contact-list">
                    <li>
                        <span class="icon">📍</span>
                        <span>Location: Singapore</span>
                    </li>
                    <li>
                        <span class="icon">📧</span>
                        <p><a href="mailto:gary.liew&#64;domain.com">gary.liew&#64;domain.com</a></p>
                    </li>
                    <li>
                        <span class="icon"><i class="fab fa-linkedin"></i></span>
                        <p><a href="https://www.linkedin.com/in/garyliewhl/" target="_blank">LinkedIn</a></p>
                    </li>
                    <li>
                        <span class="icon"><i class="fab fa-instagram"></i></span>
                        <p><a href="https://www.instagram.com/garyliewhl/" target="_blank">Instagram</a></p>
                    </li>
                </ul>
            </div>

            <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" formControlName="name" placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" formControlName="email" placeholder="Your Email">
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" formControlName="subject" placeholder="Subject">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" formControlName="message" placeholder="Your Message" rows="5"></textarea>
                </div>

            </form>
        </div>
    </div>
</section>
